# Publica solo los archivos del juego PWA en la rama gh-pages.
# Luego en GitHub: Settings → Pages → Deploy from branch → gh-pages → / (root)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preparar sitio web
        run: |
          mkdir site
          cp index.html manifest.webmanifest sw.js icon.svg peerjs.min.js .nojekyll site/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
