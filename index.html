<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a5c1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Super Bear">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Super Bear Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 30%, #1a3a1a 0%, #050a08 70%);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; height: 100dvh; overflow: hidden;
  touch-action: none; user-select: none; -webkit-user-select: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
body.touch {
  padding:
    env(safe-area-inset-top)
    env(safe-area-inset-right)
    env(safe-area-inset-bottom)
    env(safe-area-inset-left);
}
canvas {
  display: block; image-rendering: pixelated;
  border-radius: 8px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,215,0,0.08);
}
body.touch canvas {
  border-radius: 0;
  box-shadow: none;
  max-width: 100%;
  max-height: 100%;
}

/* ── On-screen touch controls (solo al jugar) ── */
#touch { display: none; pointer-events: none; }
body.touch.playing #touch { display: block; pointer-events: auto; }

#touch .pad, #touch .btns { position: fixed; bottom: 28px; z-index: 10; }
#touch .pad  { left: 20px; }
#touch .btns { right: 20px; display: flex; align-items: flex-end; gap: 16px; }

.tbtn {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 26px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(145deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06));
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  touch-action: none;
  transition: transform 0.08s, background 0.08s, box-shadow 0.08s;
}
.tbtn.active {
  transform: scale(0.94);
  background: linear-gradient(145deg, rgba(255,215,0,0.55), rgba(255,180,0,0.25));
  border-color: #ffd700;
  box-shadow: 0 2px 12px rgba(255,215,0,0.35), inset 0 2px 8px rgba(0,0,0,0.15);
}

/* D-pad layout (cross) */
.pad { display: grid; grid-template-columns: repeat(3, 68px); grid-template-rows: repeat(3, 68px); gap: 5px; }
#bUp    { grid-column: 2; grid-row: 1; }
#bLeft  { grid-column: 1; grid-row: 2; }
#bDown  { grid-column: 2; grid-row: 3; }
#bRight { grid-column: 3; grid-row: 2; }

/* Action buttons */
#bJump  {
  width: 100px; height: 100px; border-radius: 50%; font-size: 15px; letter-spacing: 0.5px;
  background: linear-gradient(145deg, rgba(80,220,100,0.45), rgba(40,140,60,0.35));
  border-color: rgba(120,255,140,0.75);
  box-shadow: 0 4px 20px rgba(60,200,80,0.25), inset 0 1px 0 rgba(255,255,255,0.25);
}
#bSp    {
  width: 78px; height: 78px; border-radius: 50%; font-size: 18px;
  background: linear-gradient(145deg, rgba(255,210,77,0.45), rgba(200,150,30,0.35));
  border-color: rgba(255,210,77,0.85);
  box-shadow: 0 4px 18px rgba(255,200,50,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
}
#bPause {
  position: fixed; top: 18px; right: 18px; width: 52px; height: 52px;
  font-size: 18px; border-radius: 14px;
  background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
}

/* Celular: controles mas compactos para no tapar el juego */
body.touch.playing #touch .pad,
body.touch.playing #touch .btns { bottom: max(8px, env(safe-area-inset-bottom)); }
body.touch.playing #touch .pad { left: max(8px, env(safe-area-inset-left)); }
body.touch.playing #touch .btns { right: max(8px, env(safe-area-inset-right)); gap: 8px; }
body.touch .pad {
  grid-template-columns: repeat(3, 50px);
  grid-template-rows: repeat(3, 50px);
  gap: 3px;
}
body.touch .tbtn {
  font-size: 18px;
  border-radius: 12px;
  border-width: 1.5px;
}
body.touch #bJump {
  width: 68px; height: 68px;
  font-size: 11px;
}
body.touch #bSp {
  width: 54px; height: 54px;
  font-size: 11px;
}
body.touch #bPause {
  top: max(8px, env(safe-area-inset-top));
  right: max(8px, env(safe-area-inset-right));
  width: 40px; height: 40px;
  font-size: 14px;
  border-radius: 10px;
}
body.touch.kart-race #bJump,
body.touch.kart-race #bSp { font-size: 9px; }

@media (orientation: portrait) {
  body.touch.playing #touch .pad,
  body.touch.playing #touch .btns { bottom: max(14px, env(safe-area-inset-bottom)); }
  body.touch .pad {
    grid-template-columns: repeat(3, 46px);
    grid-template-rows: repeat(3, 46px);
  }
  body.touch #bJump { width: 62px; height: 62px; }
  body.touch #bSp { width: 50px; height: 50px; }
}

/* Barra de navegacion tactil en menus */
#mobNav {
  display: none;
  position: fixed;
  left: 50%;
  bottom: max(10px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 25;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: rgba(8, 12, 20, 0.92);
  border: 1px solid rgba(255, 215, 0, 0.35);
  border-radius: 22px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
  pointer-events: auto;
  touch-action: manipulation;
}
body.touch.mob-menu #mobNav.visible { display: flex; }
.mnav {
  display: flex; align-items: center; justify-content: center;
  min-width: 42px; height: 42px;
  padding: 0 10px;
  font: bold 16px monospace;
  color: #eef4ff;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  touch-action: manipulation;
}
.mnav.active { background: rgba(255, 215, 0, 0.35); border-color: #ffd700; color: #fff; }
#mobOk {
  min-width: 52px;
  background: linear-gradient(180deg, #ffd700, #c9a000);
  color: #111;
  border-color: rgba(255, 215, 0, 0.8);
  font-size: 15px;
}
#mobLeft, #mobRight { display: none; }
body.touch.mob-nav-wide #mobLeft,
body.touch.mob-nav-wide #mobRight { display: flex; }

@media (max-width: 480px) {
  .mnav { min-width: 36px; height: 36px; font-size: 14px; padding: 0 8px; }
  #mobOk { min-width: 44px; font-size: 13px; }
  #mobNav { gap: 4px; padding: 5px 8px; }
}

/* Aviso rotar pantalla al jugar en vertical */
#rotateHint {
  display: none;
  position: fixed;
  top: max(6px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  z-index: 12;
  padding: 7px 14px;
  background: rgba(8, 12, 20, 0.88);
  border: 1px solid rgba(255, 215, 0, 0.4);
  border-radius: 12px;
  color: #ffd700;
  font: bold 12px system-ui, sans-serif;
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}
body.touch.playing #rotateHint { display: block; }
@media (orientation: landscape) {
  body.touch.playing #rotateHint { display: none !important; }
}

/* Campo de codigo multijugador (movil) */
#mpJoinUi {
  display: none;
  position: fixed;
  left: 50%;
  bottom: max(18px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 20;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: min(92vw, 380px);
}
body.touch.mob-join #mpJoinUi { display: flex; }
body.touch.mob-join #touch,
body.touch.mob-join #mobNav { display: none !important; }
#mpCodeInput {
  width: 100%;
  padding: 16px 20px;
  font: bold 32px monospace;
  text-align: center;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  border: 2px solid rgba(255,215,0,0.65);
  border-radius: 14px;
  background: rgba(8,12,24,0.96);
  color: #ffd700;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}
#mpCodeInput::placeholder { color: rgba(255,215,0,0.35); letter-spacing: 0.2em; }
#mpJoinBtn {
  width: 100%;
  padding: 14px;
  font: bold 22px monospace;
  border: none;
  border-radius: 12px;
  background: linear-gradient(180deg, #ffd700, #c9a000);
  color: #111;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Touch controls overlay -->
<div id="touch">
  <div class="pad">
    <div class="tbtn" id="bUp"    data-code="ArrowUp">▲</div>
    <div class="tbtn" id="bLeft"  data-code="ArrowLeft">◀</div>
    <div class="tbtn" id="bDown"  data-code="ArrowDown">▼</div>
    <div class="tbtn" id="bRight" data-code="ArrowRight">▶</div>
  </div>
  <div class="btns">
    <div class="tbtn" id="bSp"   data-code="KeyJ">SP</div>
    <div class="tbtn" id="bJump" data-code="Space">JUMP</div>
  </div>
  <div class="tbtn" id="bPause" data-code="Escape">II</div>
</div>

<div id="mobNav">
  <button type="button" id="mobBack" class="mnav">←</button>
  <button type="button" id="mobLeft" class="mnav">◀</button>
  <button type="button" id="mobUp" class="mnav">▲</button>
  <button type="button" id="mobDown" class="mnav">▼</button>
  <button type="button" id="mobRight" class="mnav">▶</button>
  <button type="button" id="mobOk" class="mnav">OK</button>
</div>

<div id="rotateHint">Gira el celular ↔ para jugar mejor</div>

<div id="mpJoinUi">
  <input id="mpCodeInput" type="text" maxlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false" enterkeyhint="go" inputmode="text" placeholder="CODIGO">
  <button id="mpJoinBtn" type="button">UNIRSE</button>
</div>

<script src="vendor/peer.min.js"></script>
<script>
if (typeof Peer === 'undefined') {
  document.write('<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"><\/script>');
}
</script>
<script src="js/game.js"></script>
</body>
</html>
