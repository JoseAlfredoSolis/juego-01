<title>Super Bear Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 30%, #1a3a1a 0%, #050a08 70%);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; overflow: hidden;
  touch-action: none; user-select: none; -webkit-user-select: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
canvas {
  display: block; image-rendering: pixelated;
  border-radius: 8px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,215,0,0.08);
}

/* ── On-screen touch controls (shown only on touch devices) ── */
#touch { display: none; pointer-events: none; }
body.touch #touch { display: block; pointer-events: auto; }

#touch .pad, #touch .btns { position: fixed; bottom: 28px; z-index: 10; }
#touch .pad  { left: 20px; }
#touch .btns { right: 20px; display: flex; align-items: flex-end; gap: 16px; }

.tbtn {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 26px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(145deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06));
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  touch-action: none;
  transition: transform 0.08s, background 0.08s, box-shadow 0.08s;
}
.tbtn.active {
  transform: scale(0.94);
  background: linear-gradient(145deg, rgba(255,215,0,0.55), rgba(255,180,0,0.25));
  border-color: #ffd700;
  box-shadow: 0 2px 12px rgba(255,215,0,0.35), inset 0 2px 8px rgba(0,0,0,0.15);
}

/* D-pad layout (cross) */
.pad { display: grid; grid-template-columns: repeat(3, 68px); grid-template-rows: repeat(3, 68px); gap: 5px; }
#bUp    { grid-column: 2; grid-row: 1; }
#bLeft  { grid-column: 1; grid-row: 2; }
#bDown  { grid-column: 2; grid-row: 3; }
#bRight { grid-column: 3; grid-row: 2; }

/* Action buttons */
#bJump  {
  width: 100px; height: 100px; border-radius: 50%; font-size: 15px; letter-spacing: 0.5px;
  background: linear-gradient(145deg, rgba(80,220,100,0.45), rgba(40,140,60,0.35));
  border-color: rgba(120,255,140,0.75);
  box-shadow: 0 4px 20px rgba(60,200,80,0.25), inset 0 1px 0 rgba(255,255,255,0.25);
}
#bSp    {
  width: 78px; height: 78px; border-radius: 50%; font-size: 18px;
  background: linear-gradient(145deg, rgba(255,210,77,0.45), rgba(200,150,30,0.35));
  border-color: rgba(255,210,77,0.85);
  box-shadow: 0 4px 18px rgba(255,200,50,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
}
#bPause {
  position: fixed; top: 18px; right: 18px; width: 52px; height: 52px;
  font-size: 18px; border-radius: 14px;
  background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
}

@media (orientation: portrait) {
  #touch .pad, #touch .btns { bottom: 64px; }
}
</style>

function clearFrame() { for (const k in keyDown) delete keyDown[k]; for (const k in keyUp) delete keyUp[k]; }
function pressed(c) { return !!keyDown[c]; }
function held(c)    { return !!keys[c]; }

// ── Utilities ─────────────────────────────────────────────────────────────

  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;

// ── Checkpoints ──────────────────────────────────────────────────────────────
// Auto-placed on the wide ground platforms near 35% and 65% of the level so
// players don't restart from scratch after a death.
function computeCheckpoints(ld) {
  const ground = ld.platforms.filter(p => p[1] >= 595 && p[2] >= 200);
  const out = [];
  for (const frac of [0.35, 0.65]) {
    const tx = ld.levelW * frac;
    // skip if it would land on the very start or near the goal
    if (tx < 500 || tx > ld.goal[0] - 400) continue;
    let best = null, bestD = Infinity;
    for (const p of ground) {
      const cx = p[0] + p[2]/2;
      const inside = tx >= p[0]+60 && tx <= p[0]+p[2]-60;
      const d = inside ? 0 : Math.abs(cx - tx);
      if (d < bestD) { bestD = d; best = p; }
    }
    if (!best) continue;
    const cx = clamp(tx, best[0]+40, best[0]+best[2]-40);
    out.push({ x: cx, y: best[1]-64, reached:false });
  }
  return out;
}
function updateCheckpoints() {
  for (const c of checkpoints) {
    if (c.reached) continue;
    if (rectOverlap(player.x,player.y,player.w,player.h, c.x-18,c.y,36,64)) {
      c.reached = true;
      player.respawnX = c.x - player.w/2;
      player.respawnY = c.y - 10;
      sfx.power();
      spawnRing(c.x, c.y+20, '#39d353', 50, 0.4);
      spawnText(c.x, c.y-6, 'CHECKPOINT', '#39d353', 16);
    }
  }
}
function drawCheckpoints() {
  const t = performance.now()/1000;
  for (const c of checkpoints) {
    const x = c.x - cam.x, y = c.y - cam.y;
    ctx.fillStyle='#5a4632'; ctx.fillRect(x-2,y,5,64);
    ctx.fillStyle='#6a5640'; ctx.fillRect(x,y,2,64);
    const wave = c.reached ? Math.sin(t*8)*5 : Math.sin(t*3+c.x)*1.5;
    ctx.fillStyle = c.reached ? '#39d353' : '#888';
    ctx.beginPath();
    ctx.moveTo(x, y+4);
    ctx.lineTo(x+36+wave, y+14);
    ctx.lineTo(x, y+26);
    ctx.closePath(); ctx.fill();
    if(c.reached){
      ctx.globalAlpha=0.25+0.15*Math.sin(t*4); fillRR(x-12,y-8,48,40,8,'#39d353'); ctx.globalAlpha=1;
    }
    ctx.fillStyle=c.reached?UI.gold:'#aaa'; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
  }
}
function updateHazards(dt) {
  const dm = diff().enemy;
  for (const h of hazards) {
    if (h.type==='saw') {
      const spd = 150*dm;
      if (h.x <= h.startX - h.range/2) h.dir=1;
      if (h.x >= h.startX + h.range/2) h.dir=-1;
      h.x += h.dir*spd*dt;
      h.rot += dt*14;
    }
  }
}
function drawHazards() {
  for (const h of hazards) {
    const x=h.x-cam.x, y=h.y-cam.y;
    if (h.type==='spikes') {
      const n=Math.max(1,Math.floor(h.w/14));
      ctx.fillStyle='#aab3bd';
      for (let i=0;i<n;i++){
        const sx=x+i*(h.w/n);
        ctx.beginPath(); ctx.moveTo(sx,y+h.h); ctx.lineTo(sx+(h.w/n)/2,y); ctx.lineTo(sx+(h.w/n),y+h.h); ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle='#5b6470'; ctx.fillRect(x,y+h.h-3,h.w,3);
    } else { // spinning saw
      const cx=x+h.w/2, cy=y+h.h/2, r=h.w/2;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(h.rot);
      ctx.fillStyle='#c8ccd2';
      for (let i=0;i<8;i++){ ctx.rotate(Math.PI/4); ctx.fillRect(-3,-r-5,6,9); }
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='#9aa3ad'; ctx.fill();
      ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fillStyle='#5b6470'; ctx.fill();
      ctx.restore();
    }
  }
}

const audio = { ctx:null, sound:true, music:true };
function audioInit() {
  try {
    if (!audio.ctx) audio.ctx = new (window.AudioContext||window.webkitAudioContext)();
    if (audio.ctx.state==='suspended') audio.ctx.resume();
    if (audio.music) musicStart();
  } catch(e){}
}
function beep(freq, dur, type='square', vol=0.2, slideTo=null) {
  if (!audio.sound || !audio.ctx) return;
  const t = audio.ctx.currentTime;
  const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), t+dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g).connect(audio.ctx.destination);
  o.start(t); o.stop(t+dur);
}

let musicTimer=null, musicStep=0;

function musicStart(){
  if (musicTimer || !audio.music) return;
  musicTimer=setInterval(()=>{

// ── Save / load progress (localStorage) ─────────────────────────────────────
const SAVE_KEY='superbear_save_v1';
function migrateProgress(){
  while(gs.worldUnlocked.length<WORLD_COUNT) gs.worldUnlocked.push(false);
  while(gs.levelDone.length<WORLD_COUNT) gs.levelDone.push([false,false,false]);
  for(let w=0;w<WORLD_COUNT-1;w++){
    if(gs.levelDone[w] && gs.levelDone[w].every(Boolean)) gs.worldUnlocked[w+1]=true;
  }
}
function loadSave(){
  try{
    const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    if(typeof s.highScore==='number') gs.highScore=s.highScore;
    if(Array.isArray(s.worldUnlocked)) gs.worldUnlocked=s.worldUnlocked;
    if(Array.isArray(s.levelDone)) gs.levelDone=s.levelDone;
    migrateProgress();
    if(typeof s.sound==='boolean') audio.sound=s.sound;
    if(typeof s.music==='boolean') audio.music=s.music;
    if(typeof s.character==='number') gs.character=s.character;
    if(typeof s.difficulty==='number' && s.difficulty>=0 && s.difficulty<DIFFICULTIES.length) gs.difficulty=s.difficulty;
    if(typeof s.wallet==='number') gs.wallet=s.wallet;
    if(typeof s.bonusLives==='number') gs.bonusLives=clamp(s.bonusLives,0,3);
    if(typeof s.magnet==='boolean') gs.magnet=s.magnet;
    if(s.bought && typeof s.bought==='object') gs.bought=s.bought;
    if(s.ach && typeof s.ach==='object') gs.ach=s.ach;
    // Guard against out-of-range or still-locked saved characters
    if(gs.character<0 || gs.character>=CHARACTERS.length || !isCharUnlocked(gs.character)) gs.character=0;
  }catch(e){}
}
function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      highScore:gs.highScore, worldUnlocked:gs.worldUnlocked,
      levelDone:gs.levelDone, sound:audio.sound, music:audio.music,
      character:gs.character, difficulty:gs.difficulty,
      wallet:gs.wallet, bonusLives:gs.bonusLives, magnet:gs.magnet,
      bought:gs.bought, ach:gs.ach
    }));
  }catch(e){}
}
function resetProgress(){
  gs.highScore=0;
  gs.worldUnlocked=freshUnlocked();
  gs.levelDone=freshLevelDone();
  gs.wallet=0; gs.bonusLives=0; gs.magnet=false; gs.bought={}; gs.ach={};
  saveGame();
}
loadSave();

let particles=[];
function spawnParticles(x,y,color,n=8,spd=160){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=spd*(0.4+Math.random()*0.6);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:0.6+Math.random()*0.3,max:0.9,color,size:3+Math.random()*3});
  }
}
function updateParticles(dt){
  for(const p of particles){ p.vx*=0.92; p.vy+=600*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }
  particles=particles.filter(p=>p.life>0);
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-cam.x,p.y-cam.y,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function spawnText(x,y,text,color='#fff',size=18){ fx.push({kind:'text',x,y,vy:-46,text,color,size,life:0.8,max:0.8}); }
function spawnDust(x,y,n=8,color='#d9cdb0'){ // ground puff
  for(let i=0;i<n;i++){
    const a=-Math.PI/2 + (Math.random()-0.5)*Math.PI*1.2, s=70+Math.random()*90;
    fx.push({kind:'dust',x,y,vx:Math.cos(a)*s,vy:Math.abs(Math.sin(a))*-s*0.5,life:0.4+Math.random()*0.2,max:0.6,color,size:3+Math.random()*4});
  }
}
function spawnSparks(x,y,color,n=10,spd=320){ // bright fast streaks
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=spd*(0.5+Math.random()*0.7);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.25,max:0.55,color,size:2+Math.random()*3});
  }
}
function addShake(t){ shake=Math.max(shake,t); }
function addFlash(color,life=0.18){ flash={color,life,max:life}; }
function updateFx(dt){
  for(const e of fx){
    e.life-=dt;
    if(e.kind==='ring') e.r += (e.maxR-e.r)*Math.min(1,dt*10);
    else if(e.kind==='text'){ e.y+=e.vy*dt; e.vy*=0.94; }
    else if(e.kind==='dust'){ e.x+=e.vx*dt; e.y+=e.vy*dt; e.vy+=300*dt; e.vx*=0.9; }
  }
  fx=fx.filter(e=>e.life>0);
  if(shake>0) shake-=dt;
  if(flash){ flash.life-=dt; if(flash.life<=0) flash=null; }
  if(banner){ banner.life-=dt; if(banner.life<=0) banner=null; }
}
function drawFx(){
  for(const e of fx){
    const a=Math.max(0,e.life/e.max);
    if(e.kind==='ring'){
      ctx.globalAlpha=a;
      ctx.strokeStyle=e.color; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(e.x-cam.x, e.y-cam.y, e.r, 0, Math.PI*2); ctx.stroke();
    } else if(e.kind==='after'){
      ctx.globalAlpha=a*0.45;
      ctx.fillStyle=e.color;
      ctx.fillRect(e.x-cam.x, e.y-cam.y, PLAYER_W, PLAYER_H);
    } else if(e.kind==='dust'){
      ctx.globalAlpha=a*0.7;
      ctx.fillStyle=e.color;
      ctx.fillRect(e.x-cam.x, e.y-cam.y, e.size, e.size);
    } else if(e.kind==='text'){
      ctx.globalAlpha=Math.min(1,a*1.4);
      ctx.fillStyle=e.color; ctx.font=`bold ${e.size}px monospace`; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,0.6)';
      ctx.strokeText(e.text, e.x-cam.x, e.y-cam.y);
      ctx.fillText(e.text, e.x-cam.x, e.y-cam.y);
    }
  }
  ctx.globalAlpha=1;
}
function drawFlash(){ // screen-space; call after camera restore
  if(!flash) return;
  ctx.globalAlpha=Math.max(0,flash.life/flash.max)*0.5;
  ctx.fillStyle=flash.color; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;
}
function drawBanner(){ // screen-space announcement (e.g. boss defeated)
  if(!banner) return;
  const a=banner.life/banner.max, t=1-a;
  const scale=0.6 + Math.min(1,t*5)*0.5 + Math.sin(banner.life*9)*0.02;
  ctx.save();
  ctx.globalAlpha=Math.min(1,a*2.2);
  ctx.translate(W/2,180); ctx.scale(scale,scale);
  ctx.font='bold 52px monospace'; ctx.textAlign='center';
  const tw=ctx.measureText(banner.text).width+48;
  fillRR(-tw/2,-38,tw,56,14,'rgba(10,16,26,0.88)'); strokeRR(-tw/2,-38,tw,56,14,banner.color,2);
  ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.strokeText(banner.text,0,0);
  ctx.fillStyle=banner.color; ctx.fillText(banner.text,0,0);
  ctx.restore(); ctx.globalAlpha=1;
}

// ── Camera ─────────────────────────────────────────────────────────────────
const cam = { x:0, y:0 };
function camUpdate(px, py, levelW, snap=false) {
  const tx = clamp(px + PLAYER_W/2 - W/2, 0, levelW - W);
  const ty = clamp(py + PLAYER_H/2 - H/2, 0, 720 - H);
  if (snap) { cam.x = tx; cam.y = ty; }
  else { cam.x = lerp(cam.x, tx, 0.18); cam.y = lerp(cam.y, ty, 0.18); }
}

function rect(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(x-cam.x,y-cam.y,w,h); }
function rectS(x,y,w,h,c,lw=2) { ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.strokeRect(x-cam.x+0.5,y-cam.y+0.5,w-1,h-1); }

  panel:'rgba(10,16,26,0.92)', panelBorder:'rgba(255,215,0,0.32)' };
function roundRectPath(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}
function fillRR(x,y,w,h,r,c){ roundRectPath(x,y,w,h,r); ctx.fillStyle=c; ctx.fill(); }
function strokeRR(x,y,w,h,r,c,lw=2){ roundRectPath(x,y,w,h,r); ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.stroke(); }
function uiBgGrad(c1,c2,vignette=true){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(vignette){ const v=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,Math.max(W,H)*0.72);
    v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.5)'); ctx.fillStyle=v; ctx.fillRect(0,0,W,H); }
}

// ── Scene transitions (fade between screens) ────────────────────────────────
let sceneTrans = { active:false, t:0, dur:0.34, from:'menu', to:'menu', mode:'in' };
function changeScene(next, instant=false){
  if(next===gs.scene && !sceneTrans.active) return;
  if(instant){ gs.scene=next; sceneTrans.active=false; mpHostBroadcast(); return; }
  if(sceneTrans.active) return;
  sceneTrans = { active:true, t:0, dur:0.34, from:gs.scene, to:next, mode:'out' };
}
function updateSceneTrans(dt){
  if(!sceneTrans.active) return;
  sceneTrans.t += dt;
  if(sceneTrans.mode==='out' && sceneTrans.t>=sceneTrans.dur){
    gs.scene=sceneTrans.to; sceneTrans.mode='in'; sceneTrans.t=0;
  } else if(sceneTrans.mode==='in' && sceneTrans.t>=sceneTrans.dur){
    sceneTrans.active=false;
    mpHostBroadcast();
  }
}

// ── Multiplayer online (PeerJS P2P — invitar amigos) ───────────────────────
const mp = {
  active:false, role:null, peer:null, conn:null,
  roomCode:'', connected:false, status:'', errMsg:'',
  remote:null, remoteChar:1, remoteName:'Amigo',
  syncAcc:0, joinBuf:'', autoJoin:false, menuSel:0, createT:0
};
function mpGenCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=c[(Math.random()*c.length)|0];
  return s;
}
function mpDisconnect(){
  mp.active=false; mp.connected=false; mp.remote=null; mp.role=null; mp.roomCode=''; mp.status=''; mp.errMsg='';
  if(mp.conn){ try{mp.conn.close();}catch(e){} mp.conn=null; }
  if(mp.peer){ try{mp.peer.destroy();}catch(e){} mp.peer=null; }
}
function mpSend(obj){
  if(!mp.conn||!mp.connected) return;
  try{ mp.conn.send(JSON.stringify(obj)); }catch(e){}
}
function mpInviteUrl(){
  const u=new URL(location.href); u.searchParams.set('sala', mp.roomCode); return u.href;
}
async function mpCopyInvite(){
  const url=mpInviteUrl(), txt='Super Bear Adventure — Codigo: '+mp.roomCode+'\n'+url;
  try{
    if(navigator.share) await navigator.share({title:'Super Bear Adventure', text:'Juguemos juntos! Codigo: '+mp.roomCode, url});
    else if(navigator.clipboard) await navigator.clipboard.writeText(txt);
    mp.status='Enlace copiado — envialo a tu amigo';
    sfx.select();
  }catch(e){ mp.status='Codigo: '+mp.roomCode; }
}
function mpSetupConn(conn){
  conn.on('open', ()=>{
    mp.connected=true;
    mp.status=mp.role==='host' ? 'Amigo conectado!' : 'Conectado al anfitrion';
    mpSend({t:'hi', char:gs.character, name:(CHARACTERS[gs.character]||CHARACTERS[0]).name});
    if(mp.role==='host') mpHostBroadcast();
    unlockAch('coop');
    sfx.star();
  });
  conn.on('data', d=>{ try{mpHandle(JSON.parse(d));}catch(e){} });
  conn.on('close', ()=>{ mp.connected=false; mp.status='Amigo desconectado'; mp.remote=null; });
}
function mpHostCreate(){
  if(typeof Peer==='undefined'){ mp.errMsg='PeerJS no cargo — revisa internet'; return; }
  mpDisconnect();
  mp.active=true; mp.role='host'; mp.roomCode=mpGenCode();
  mp.status='Creando sala...';
  mp.peer=new Peer('sbear-'+mp.roomCode);
  mp.peer.on('open', ()=>{ mp.status='Comparte el codigo con tu amigo'; });
  mp.peer.on('connection', conn=>{ mp.conn=conn; mpSetupConn(conn); });
  mp.peer.on('error', ()=>{ mp.errMsg='Error al crear sala — reintenta'; mp.status='Error'; });
}
function mpGuestJoin(code){
  if(typeof Peer==='undefined'){ mp.errMsg='PeerJS no cargo — revisa internet'; return; }
  code=(code||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
  if(code.length<6){ mp.errMsg='Codigo de 6 caracteres'; return; }
  mpDisconnect();
  mp.active=true; mp.role='guest'; mp.roomCode=code;
  mp.status='Conectando a '+code+'...'; mp.errMsg='';
  mp.peer=new Peer();
  mp.peer.on('open', ()=>{
    const conn=mp.peer.connect('sbear-'+code, {reliable:true});
    mp.conn=conn; mpSetupConn(conn);
  });
  mp.peer.on('error', ()=>{ mp.errMsg='No se encontro la sala — revisa el codigo'; mp.status='Error'; });
}
function mpHostBroadcast(){
  if(!mp.active||mp.role!=='host'||!mp.connected) return;
  const syncScenes=['worldmap','gameplay','pause','levelcomplete','gameover','victory','charselect'];
  if(!syncScenes.includes(gs.scene)) return;
  mpSend({t:'scene', scene:gs.scene, world:gs.world, level:gs.level,
    lives:gs.lives, score:gs.score, coins:gs.coins, wmSel, wmLvl, char:gs.character});
}
function mpApplyScene(msg){
  if(mp.role!=='guest') return;
  if(['mpcreate','mpjoin','multimenu','menu'].includes(msg.scene)) return;
  if(typeof msg.lives==='number') gs.lives=msg.lives;
  if(typeof msg.score==='number') gs.score=msg.score;
  if(typeof msg.coins==='number') gs.coins=msg.coins;
  if(typeof msg.wmSel==='number') wmSel=msg.wmSel;
  if(typeof msg.wmLvl==='number') wmLvl=msg.wmLvl;
  if(msg.scene==='gameplay'){
    const need=gs.world!==msg.world||gs.level!==msg.level||gs.scene!=='gameplay';
    gs.world=msg.world; gs.level=msg.level;
    if(need){ startLevel(); changeScene('gameplay', true); }
    else if(gs.scene!=='gameplay') changeScene('gameplay', true);
  } else if(msg.scene && msg.scene!==gs.scene){
    changeScene(msg.scene, true);
  }
}
function mpHandle(msg){
  switch(msg.t){
    case 'hi':
      mp.remoteChar=msg.char??1; mp.remoteName=msg.name||'Amigo';
      break;
    case 'scene':
    case 'sync':
      mpApplyScene(msg);
      break;
    case 'pos':
      if(!mp.remote) mp.remote=mkRemotePlayer();
      mp.remote.tx=msg.x; mp.remote.ty=msg.y;
      mp.remote.vx=msg.vx||0; mp.remote.vy=msg.vy||0;
      mp.remote.facing=msg.facing||1;
      mp.remote.char=msg.char??mp.remoteChar;
      mp.remote.inv=msg.inv||0; mp.remote.shield=msg.sh||0;
      mp.remoteChar=msg.char??mp.remoteChar;
      break;
  }
}
function mkRemotePlayer(){
  return {x:140,y:570,tx:140,ty:570,vx:0,vy:0,facing:-1,w:PLAYER_W,h:PLAYER_H,char:1,inv:0,shield:0};
}
function mpTick(dt){
  if(!mp.active||!mp.connected) return;
  mp.syncAcc+=dt;
  if(mp.syncAcc>=0.05 && player && gs.scene==='gameplay'){
    mp.syncAcc=0;
    mpSend({t:'pos', x:player.x, y:player.y, vx:player.vx, vy:player.vy,
      facing:player.facing, char:gs.character,
      inv:player.invTimer>0?1:0, sh:player.shieldTimer>0?1:0});
  }
  if(mp.remote){
    mp.remote.x=lerp(mp.remote.x, mp.remote.tx, 0.38);
    mp.remote.y=lerp(mp.remote.y, mp.remote.ty, 0.38);
  }
}
function drawRemotePlayer(){
  if(!mp.remote||!mp.connected||gs.scene!=='gameplay') return;
  const rp=mp.remote;
  const x=rp.x-cam.x, y=rp.y-cam.y;
  const fake={facing:rp.facing, shieldTimer:rp.shield?1.5:0, invTimer:rp.inv?0.5:0};
  (CHARACTERS[rp.char]||CHARACTERS[1]).draw(fake, x, y);
  fillRR(x+PLAYER_W/2-28, y-24, 56, 16, 5, 'rgba(0,180,255,0.55)');
  hud(mp.remoteName||'Amigo', x+PLAYER_W/2, y-12, '#fff', 11, 'center');
}
function mpJoinKeys(){
  for(const k in keyDown){
    if(k==='Backspace'){ mp.joinBuf=mp.joinBuf.slice(0,-1); sfx.select(); return; }
    if(k==='Enter' && mp.joinBuf.length===6){ mpGuestJoin(mp.joinBuf); return; }
    if(k.startsWith('Key') && mp.joinBuf.length<6){
      const ch=k.slice(3); if(ch.length===1 && ch>='A' && ch<='Z'){ mp.joinBuf+=ch; sfx.select(); return; }
    }
    if(k.startsWith('Digit') && mp.joinBuf.length<6){ mp.joinBuf+=k.slice(5); sfx.select(); return; }
  }
}
function drawSceneTrans(){
  if(!sceneTrans.active) return;
  const a=sceneTrans.mode==='out' ? sceneTrans.t/sceneTrans.dur : 1-sceneTrans.t/sceneTrans.dur;
  const fade=clamp(a,0,1);
  ctx.fillStyle=`rgba(6,10,18,${fade*0.9})`; ctx.fillRect(0,0,W,H);
  if(fade>0.45 && fade<0.55){
    ctx.strokeStyle=`rgba(255,215,0,${0.25*(1-Math.abs(fade-0.5)*20)})`;
    ctx.lineWidth=2; ctx.strokeRect(W/2-120,H/2-2,240,4);
  }
}
function renderScene(){ return (sceneTrans.active && sceneTrans.mode==='out') ? sceneTrans.from : gs.scene; }
function sceneUpdating(){ return !sceneTrans.active || sceneTrans.mode==='in'; }

// ── Physics ────────────────────────────────────────────────────────────────
function resolveX(e, plats) {
  for (const p of plats) {
    if (!rectOverlap(e.x,e.y,e.w,e.h, p[0],p[1],p[2],p[3])) continue;
    const overlapX = Math.min(e.x+e.w, p[0]+p[2]) - Math.max(e.x, p[0]);
    const overlapY = Math.min(e.y+e.h, p[1]+p[3]) - Math.max(e.y, p[1]);
    if (overlapX < overlapY) {
      if (e.x < p[0]) { e.x = p[0]-e.w; } else { e.x = p[0]+p[2]; }
      e.vx = 0;
    }
  }
}
function resolveY(e, plats) {
  e.onGround = false;
  for (const p of plats) {
    if (!rectOverlap(e.x,e.y,e.w,e.h, p[0],p[1],p[2],p[3])) continue;
    const overlapX = Math.min(e.x+e.w, p[0]+p[2]) - Math.max(e.x, p[0]);
    const overlapY = Math.min(e.y+e.h, p[1]+p[3]) - Math.max(e.y, p[1]);
    if (overlapY <= overlapX) {
      if (e.y < p[1]) { e.y = p[1]-e.h; e.vy = 0; e.onGround = true; }
      else { e.y = p[1]+p[3]; e.vy = 0; }
    }
  }
}

// ── Player ─────────────────────────────────────────────────────────────────
function mkPlayer() {
  return { x:80, y:570, vx:0, vy:0, w:PLAYER_W, h:PLAYER_H,
    onGround:false, canDjump:false, djumpUsed:false,
    lives:gs.lives, invTimer:0, respawnTimer:0,
    power:null, powerTimer:0,
    facing:1,
    respawnX:80, respawnY:570,   // updated by checkpoints
    sp:0, attackTimer:0, dashTimer:0, shieldTimer:0   // special-ability state
  };
}
function doSpecial(p, ch) {
  const t = ch.special; if (!t) return;
  p.sp = t.cd;
  spawnText(p.x+p.w/2, p.y-6, t.name, t.fx, 16);   // shout the move name
  if (t.type==='punch') {
    p.attackTimer = 0.28; sfx.stomp();
    const fxX=p.x+p.w/2 + p.facing*26, fxY=p.y+p.h/2;
    spawnParticles(fxX, fxY, t.fx, 18, 300);
    spawnSparks(fxX, fxY, '#fff', 12, 380);
    spawnRing(fxX, fxY, t.fx, 80, 0.4);     // shockwave
    spawnRing(fxX, fxY, '#fff', 50, 0.3);
    addShake(0.18); addFlash(t.fx, 0.12);
  } else if (t.type==='dash') {
    p.dashTimer = 0.22; sfx.jump();
    spawnParticles(p.x+p.w/2, p.y+p.h/2, t.fx, 14, 240);
    spawnRing(p.x+p.w/2, p.y+p.h/2, t.fx, 46, 0.3);
    addShake(0.08); addFlash(t.fx, 0.08);
  } else if (t.type==='thrust') {
    p.vy = -560; p.onGround = false; sfx.jump();
    spawnParticles(p.x+p.w/2, p.y+p.h, t.fx, 18, 280);
    spawnSparks(p.x+p.w/2, p.y+p.h, t.fx, 10, 300);
    spawnRing(p.x+p.w/2, p.y+p.h, t.fx, 56, 0.35);
    addShake(0.1); addFlash(t.fx, 0.1);
  } else if (t.type==='rewind') {
    // Eri's Quirk: protective shield + heal one life (capped)
    p.invTimer = Math.max(p.invTimer, 2.2);
    p.shieldTimer = 2.2;
    const cx=p.x+p.w/2, cy=p.y+p.h/2;
    if (gs.lives < 5) { gs.lives++; p.lives = gs.lives; spawnText(cx, p.y-20, '+1 VIDA', '#ffd0e0', 18); }
    sfx.power();
    spawnRing(cx, cy, t.fx, 70, 0.55);
    spawnRing(cx, cy, '#fff', 48, 0.45);
    spawnSparks(cx, cy, t.fx, 16, 240);
    addFlash(t.fx, 0.14);
  }
}
function updatePlayer(p, dt, plats, levelW) {
  if (p.respawnTimer > 0) { p.respawnTimer -= dt; return; }

  const ch = CHARACTERS[gs.character] || CHARACTERS[0];

  // Special-ability timers
  if (p.sp>0) p.sp -= dt;
  if (p.attackTimer>0) p.attackTimer -= dt;
  if (p.dashTimer>0)   p.dashTimer   -= dt;

  const spKey = pressed('KeyJ')||pressed('ShiftLeft')||pressed('ShiftRight')||pressed('KeyK');
  if (spKey && p.sp<=0) doSpecial(p, ch);

  // Brief invulnerability while a special is active (lets you plow through enemies)
  if (p.attackTimer>0 || p.dashTimer>0) p.invTimer = Math.max(p.invTimer, 0.06);
  // Motion trail while dashing
  if (p.dashTimer>0) spawnAfterimage(p, ch.special?.fx || '#fff');

  // Input (speed/jump scaled by the chosen character's stats)
  const spd = (p.power==='speed' ? PLAYER_SPEED*1.65 : PLAYER_SPEED) * ch.speed;
  let ax = 0;
  if (held('ArrowLeft')||held('KeyA'))  { ax=-spd; p.facing=-1; }
  if (held('ArrowRight')||held('KeyD')) { ax=spd;  p.facing=1; }
  // Special movement overrides
  if (p.dashTimer>0)   ax = p.facing * 660;
  if (p.attackTimer>0) ax = p.facing * PLAYER_SPEED * 1.15;

  const jumpKey = pressed('Space')||pressed('ArrowUp')||pressed('KeyW');
  if (jumpKey && p.onGround) {
    p.vy = JUMP_V * ch.jump; p.onGround = false; sfx.jump();
    spawnDust(p.x+p.w/2, p.y+p.h, 7);                 // jump puff
    if (p.power==='djump') p.djumpUsed = false;
  } else if (jumpKey && !p.onGround && p.power==='djump' && !p.djumpUsed) {
    p.vy = DJUMP_V * ch.jump; p.djumpUsed = true; sfx.djump();
    spawnRing(p.x+p.w/2, p.y+p.h/2, '#7df', 40, 0.3); // mid-air double-jump ring
    spawnSparks(p.x+p.w/2, p.y+p.h, '#7df', 8, 200);
  }

  // Physics
  const wasGround = p.onGround;
  const fallSpeed = p.vy;
  p.vx = ax;
  p.vy = Math.min(p.vy + GRAVITY*dt, MAX_FALL);
  p.x += p.vx*dt; p.x = Math.max(0, Math.min(levelW-p.w, p.x));
  resolveX(p, plats);
  p.y += p.vy*dt;
  resolveY(p, plats);
  if (p.onGround && p.power==='djump') p.djumpUsed = false;
  // Landing puff (only after a meaningful fall)
  if (!wasGround && p.onGround && fallSpeed > 280) {
    spawnDust(p.x+p.w/2, p.y+p.h, Math.min(14, 6+Math.floor(fallSpeed/120)));
    if (fallSpeed > 720) addShake(0.06);
  }
  // Speed-trail while sprinting with the Speed power-up
  if (p.power==='speed' && Math.abs(p.vx) > 60) {
    p._trail = (p._trail||0) + dt;
    if (p._trail > 0.04) { spawnAfterimage(p, '#5f6'); p._trail = 0; }
  }

  // Timers
  if (p.invTimer > 0) p.invTimer -= dt;
  if (p.shieldTimer > 0) p.shieldTimer -= dt;
  if (p.powerTimer > 0) { p.powerTimer -= dt; if (p.powerTimer<=0) p.power=null; }
}

function worldsCleared(){
  let c=0;
  for(let w=0;w<WORLD_COUNT;w++) if(gs.levelDone[w].every(Boolean)) c++;
  return c;
}
function isCharUnlocked(i){ return (gs.bought&&gs.bought[i]) || worldsCleared() >= (CHARACTERS[i].unlock||0); }
function maxLives(){ return 5 + (gs.bonusLives||0); }

  { id:'firstcoin', name:'Primera moneda',  desc:'Recoge tu primera moneda' },

  { id:'rich',      name:'Millonario oso',  desc:'Acumula 500 monedas en total' },
  { id:'shopper',   name:'Comprador',       desc:'Compra algo en la tienda' },
  { id:'allchars',  name:'Equipo completo', desc:'Desbloquea todos los personajes' },
  { id:'allworlds', name:'Leyenda',         desc:'Completa los 6 mundos' },
  { id:'coop',      name:'Equipo online',   desc:'Juega con un amigo en linea' },
];
function unlockAch(id){
  if (gs.ach[id]) return;
  const a = ACHIEVEMENTS.find(x=>x.id===id); if(!a) return;
  gs.ach[id]=true; saveGame();
  spawnText(player?player.x+player.w/2:W/2, player?player.y-20:H/2, 'LOGRO: '+a.name, '#ffd24d', 16);
  if (typeof sfx!=='undefined') sfx.star();
}
function checkCollectAch(){
  if (gs.wallet>=500) unlockAch('rich');
  let all=true; for(let i=0;i<CHARACTERS.length;i++) if(!isCharUnlocked(i)) all=false;
  if (all) unlockAch('allchars');
  if (worldsCleared()>=WORLD_COUNT) unlockAch('allworlds');
}

function drawPlayer(p) {
  // Blink during post-hit i-frames, but NOT while a Rewind shield is up.
  if (p.shieldTimer<=0 && p.invTimer > 0 && Math.floor(p.invTimer*8)%2===0) return;
  const x=p.x-cam.x, y=p.y-cam.y;
  (CHARACTERS[gs.character]||CHARACTERS[0]).draw(p, x, y);
  // Rewind shield bubble (Eri)
  if (p.shieldTimer>0) {
    const cx=x+PLAYER_W/2, cy=y+PLAYER_H/2-2, r=PLAYER_H*0.7 + Math.sin(p.shieldTimer*12)*2;
    ctx.globalAlpha=0.35+Math.sin(p.shieldTimer*10)*0.1;
    ctx.strokeStyle='#ff8fb0'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.12; ctx.fillStyle='#ff8fb0';
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // Power glow
  if (p.power==='djump') { ctx.strokeStyle='#0ff'; ctx.lineWidth=2; ctx.strokeRect(x-1,y-7,PLAYER_W+2,PLAYER_H+7); }
  if (p.power==='speed') { ctx.strokeStyle='#0f0'; ctx.lineWidth=2; ctx.strokeRect(x-1,y-7,PLAYER_W+2,PLAYER_H+7); }
  if (p.power==='inv')   { ctx.strokeStyle='#ff0'; ctx.lineWidth=2; ctx.strokeRect(x-1,y-7,PLAYER_W+2,PLAYER_H+7); }
}

// types: patrol · chaser · boss · flyer (air) · jumper (hops) · spitter (shoots)
function mkEnemies(data) {
  return data.map(([ex,ey,type,range]) => {
    const isBoss = type==='boss';
    return {
      x:ex, y:ey, vx:0, vy:0,
      w: isBoss?58 : type==='miniboss'?46 : type==='spitter'?36 : 34,
      h: isBoss?66 : type==='miniboss'?52 : type==='flyer'?30 : type==='hunter'?32 : type==='jumper'?34 : type==='spitter'?36 : type==='armor'?40 : 38,
      onGround:false, type, range:range||160, startX:ex, baseY:ey,
      dir:1, hp:isBoss?3 : type==='miniboss'?(gs.difficulty>=2?3:2) : 1, maxhp:type==='miniboss'?(gs.difficulty>=2?3:2):1, active:true, hitFlash:0,
      // boss state
      phase:'patrol', phaseTimer:3, chargeDir:1,
      // new-enemy state
      jumpTimer: 0.8+Math.random()*1.2, shootTimer: 1.2+Math.random()*1.2, bob: Math.random()*Math.PI*2,

}
function updateEnemy(e, dt, plats, px, py, levelW) {
  if (!e.active) return;
  const dm = diff().enemy;

  // Flying enemy: no gravity, patrols horizontally and bobs vertically.
  if (e.type==='flyer') {
    const spd = 110*dm;
    if (e.x <= e.startX - e.range/2) e.dir=1;
    if (e.x >= e.startX + e.range/2) e.dir=-1;
    e.x += e.dir*spd*dt; e.x = clamp(e.x, 0, levelW-e.w);
    e.bob += dt*3;
    e.y = e.baseY + Math.sin(e.bob)*22;
    if (e.hitFlash>0) e.hitFlash-=dt;
    return;
  }

  // Flying hunter: homes in on the player when nearby, drifts home otherwise.
  if (e.type==='hunter') {
    const spd = 130*dm;
    const dx = px - e.x, dy = py - e.y;
    if (Math.abs(dx) < 440) {
      const d = Math.hypot(dx,dy) || 1;
      e.x += (dx/d)*spd*dt; e.y += (dy/d)*spd*dt;
    } else {
      e.x += Math.sign(e.startX-e.x)*spd*0.5*dt;
      e.y += Math.sign(e.baseY-e.y)*spd*0.5*dt;
    }
    e.x = clamp(e.x, 0, levelW-e.w);
    e.y = clamp(e.y, 80, 660-e.h);
    e.dir = dx<0?-1:1;
    if (e.hitFlash>0) e.hitFlash-=dt;
    return;
  }

  e.vy = Math.min(e.vy + GRAVITY*dt, MAX_FALL);

  if (e.type==='boss') {
    updateBoss(e, dt, px, py);
  } else if (e.type==='miniboss') {
    updateMiniBoss(e, dt, px, py);
  } else if (e.type==='armor') {
    // Patrols slowly, but CHARGES when it spots the player at a similar height.
    const dx = px - e.x;
    if (Math.abs(dx) < 300 && Math.abs(py - e.y) < 90) {
      e.dir = dx>0?1:-1; e.vx = e.dir * 210 * dm; e.charging = true;
    } else {
      if (e.x <= e.startX - e.range/2) e.dir = 1;
      if (e.x >= e.startX + e.range/2) e.dir = -1;
      e.vx = e.dir * 70 * dm; e.charging = false;
    }
  } else if (e.type==='jumper') {
    e.jumpTimer -= dt;
    if (e.onGround && e.jumpTimer<=0) { e.vy = -560; e.jumpTimer = 0.9+Math.random()*0.9; e.dir = px<e.x?-1:1; }
    e.vx = e.onGround ? 0 : e.dir*(95*dm);   // drift toward player while airborne
  } else if (e.type==='spitter') {
    e.vx = 0; e.dir = px<e.x?-1:1;
    e.shootTimer -= dt;
    if (e.shootTimer<=0 && Math.abs(px-e.x)<580) {
      e.shootTimer = 1.5+Math.random()*0.8;
      spawnProjectile(e.x+e.w/2, e.y+e.h/2, e.dir*(250*dm));
    }
  } else {
    const spd = (e.type==='chaser' ? 140 : 100) * dm;
    const dx = px - e.x;
    if (e.type==='chaser' && Math.abs(dx) < 260) {
      e.vx = dx > 0 ? spd : -spd;
    } else {
      if (e.x <= e.startX - e.range/2) e.dir = 1;
      if (e.x >= e.startX + e.range/2) e.dir = -1;
      e.vx = e.dir * spd;
    }
  }

  e.x += e.vx*dt; e.x = clamp(e.x, 0, levelW-e.w);
  resolveX(e, plats);
  e.y += e.vy*dt;
  resolveY(e, plats);
  if (e.hitFlash > 0) e.hitFlash -= dt;
}

// Spawn a single enemy at runtime (used by the mini-boss to summon minions).
function spawnEnemyAt(x, y, type, range, minion) {
  const e = mkEnemies([[x,y,type,range]])[0];
  if (minion) e.minion = true;
  enemies.push(e);
  return e;
}
function minionCount() { let c=0; for (const e of enemies) if (e.minion && e.active) c++; return c; }

// Drop a reward where a (mini-)boss died. Better loot on harder difficulties;
// `big` (final boss) drops extra lives, power-ups and stars.
function dropReward(x, y, big=false) {
  const d = gs.difficulty;                       // 0 easy · 1 normal · 2 hard
  const pwAll = ['djump','speed','inv'];
  const nPw   = (d>=2 ? 2 : 1) + (big?1:0);      // hard +1, boss +1
  const nLife = big ? 2 : 1;                      // boss gives two extra lives
  const nStar = (d>=1?1:0) + (big?2:0);          // boss adds extra stars
  let slot = 0;
  const place = (type,w) => { items.push({ x:x-90+slot*44, y:y-36, w, h:w, type, taken:false, bob:Math.random()*6 }); slot++; };
  for (let i=0;i<nPw;i++)   place(pwAll[Math.floor(Math.random()*pwAll.length)], 28);
  for (let i=0;i<nLife;i++) place('life', 24);
  for (let i=0;i<nStar;i++) items.push({ x:x-40+i*40, y:y-70, w:24, h:24, type:'star', taken:false, bob:Math.random()*6 });
  spawnText(x, y-48, big?'GRAN RECOMPENSA!':'RECOMPENSA!', '#ffd24d', big?18:16);
  if (big) {
    showBanner('JEFE DERROTADO!', '#FFD700');
    unlockAch('boss');
    // Final world: refill lives to the maximum as a special bonus.
    if (gs.world>=LAST_WORLD) { gs.lives = maxLives(); if (player) player.lives = gs.lives; spawnText(x, y-86, 'VIDAS AL MAXIMO!', '#ff8da1', 16); }
  }
}

// ── Projectiles (fired by spitters and mini-bosses) ─────────────────────────
let projectiles=[];
function spawnProjectile(x, y, vx){ projectiles.push({x:x-7, y:y-7, w:14, h:14, vx, life:4}); }
function updateProjectiles(dt, levelW){
  for (const p of projectiles) { p.x += p.vx*dt; p.life -= dt; }
  projectiles = projectiles.filter(p => p.life>0 && p.x>-60 && p.x<levelW+60);
}
function drawProjectiles(){
  for (const p of projectiles) {
    const x=p.x-cam.x+p.w/2, y=p.y-cam.y+p.h/2;
    ctx.fillStyle='#b06bff'; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e6ccff'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  }
}
function updateMiniBoss(b, dt, px, py) {
  const dm = diff().enemy;
  const cd = [1.2, 1.0, 0.75][gs.difficulty] ?? 1;   // attacks come faster on harder modes
  b.phaseTimer -= dt;

  // Ranged attack: fires a projectile at the player on a timer.
  b.shootTimer -= dt;
  if (b.shootTimer<=0 && Math.abs(px-b.x)<640) {
    b.shootTimer = 1.8*cd;
    const sd = px<b.x?-1:1; b.dir = sd;
    spawnProjectile(b.x+b.w/2, b.y+b.h/2-4, sd*(240*dm));
  }
  // Summon: spawns small minions occasionally (capped so it never floods).
  // Flying minions appear in later worlds.
  b.summonTimer = (b.summonTimer ?? 4) - dt;
  if (b.summonTimer<=0) {
    b.summonTimer = 5.5*cd;
    if (minionCount() < 3) {
      const mt = gs.world>=2 ? 'hunter' : gs.world>=1 ? 'flyer' : 'patrol';
      const my = mt==='patrol' ? b.y : b.y-90;
      spawnEnemyAt(b.x + (b.dir<0?-40:b.w+8), my, mt, 130, true);
      spawnParticles(b.x+b.w/2, b.y+b.h/2, '#b06bff', 14, 220);
      spawnRing(b.x+b.w/2, b.y+b.h/2, '#b06bff', 50, 0.35);
    }
  }

  if (b.phase==='patrol') {
    b.vx = b.dir * 90 * dm;
    if (b.x <= b.startX - b.range/2) b.dir=1;
    if (b.x >= b.startX + b.range/2) b.dir=-1;
    if (b.phaseTimer<=0) {
      if (Math.abs(px-b.x) < 380) { b.phase='windup'; b.phaseTimer=0.5; b.vx=0; b.chargeDir=px<b.x?-1:1; }
      else b.phaseTimer = 1.4;
    }
  } else if (b.phase==='windup') {
    b.vx=0;
    if (b.phaseTimer<=0) { b.phase='charge'; b.phaseTimer=0.6; }
  } else if (b.phase==='charge') {
    b.vx = b.chargeDir * 300 * dm;
    if (b.phaseTimer<=0) { b.phase='rest'; b.phaseTimer=1.0; b.vx=0; }
  } else {
    b.vx=0;
    if (b.phaseTimer<=0) { b.phase='patrol'; b.phaseTimer=2.0; }
  }
}
function updateBoss(b, dt, px, py) {
  const dm = diff().enemy;
  b.phaseTimer -= dt;
  if (b.phase==='patrol') {
    b.vx = b.dir * 80 * dm;
    if (b.x <= b.startX - b.range/2) b.dir=1;
    if (b.x >= b.startX + b.range/2) b.dir=-1;
    if (b.phaseTimer<=0) { b.phase='windup'; b.phaseTimer=0.6; b.vx=0; b.chargeDir=px<b.x?-1:1; }
  } else if (b.phase==='windup') {
    b.vx=0;
    if (b.phaseTimer<=0) { b.phase='charge'; b.phaseTimer=0.7; }
  } else if (b.phase==='charge') {
    b.vx = b.chargeDir * 380 * dm;
    if (b.phaseTimer<=0) { b.phase='rest'; b.phaseTimer=1.2; b.vx=0; }
  } else if (b.phase==='rest') {
    b.vx=0;
    if (b.phaseTimer<=0) { b.phase='patrol'; b.phaseTimer=3.0; }
  }
}

// ── Collectibles & Power-ups ───────────────────────────────────────────────
function mkCollectibles(coins, stars, powerups) {
  const items = [];
  for (const [cx,cy] of coins)   items.push({x:cx,y:cy,w:20,h:20,type:'coin',taken:false,bob:Math.random()*Math.PI*2});
  for (const [sx,sy] of stars)   items.push({x:sx,y:sy,w:24,h:24,type:'star',taken:false,bob:Math.random()*Math.PI*2});
  for (const [ux,uy,ut] of powerups) items.push({x:ux,y:uy,w:28,h:28,type:ut,taken:false,bob:Math.random()*Math.PI*2});
  return items;
}
function drawCollectible(it, t) {
  if (it.taken) return;
  const bob = Math.sin(t*3+it.bob)*5;
  const cx = it.x-cam.x+it.w/2, cy = it.y-cam.y+it.h/2+bob;
  if (it.type==='coin') {
    const spin = Math.abs(Math.cos(t*4+it.bob));
    const rx = 9*spin+3, ry = 10;
    ctx.globalAlpha=0.25+0.2*Math.sin(t*5+it.bob);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(cx,cy,15,15,0,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle='#8a6510'; ctx.beginPath(); ctx.ellipse(cx,cy,rx+1.5,ry+1.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.ellipse(cx-rx*0.25,cy-ry*0.3,rx*0.22,ry*0.18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#7a5500'; ctx.font='bold 10px monospace'; ctx.textAlign='center'; ctx.fillText('C',cx,cy+3);
  } else if (it.type==='star') {
    const pulse = 1+0.1*Math.sin(t*4+it.bob);
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*0.8+it.bob*0.1); ctx.scale(pulse,pulse);
    ctx.globalAlpha=0.35; ctx.fillStyle='#FFE066'; drawStar(0,0,17,7,5); ctx.globalAlpha=1;
    ctx.fillStyle='#FFD700'; drawStar(0,0,12,5,5);
    ctx.fillStyle='#FFFACD'; drawStar(0,0,5,2,5);
    ctx.restore();
  } else if (it.type==='life') {
    drawHeartIcon(cx,cy-2,12,true);
  } else {
    const colors = {djump:'#0ff',speed:'#3ecf6e',inv:'#FFD700'};
    const labels = {djump:'2x',speed:'>>',inv:'INV'};
    const col = colors[it.type]||'#fff';
    const px=it.x-cam.x, py=it.y-cam.y+bob;
    ctx.globalAlpha=0.3+0.15*Math.sin(t*3+it.bob);
    fillRR(px-5,py-5,it.w+10,it.h+10,12,col); ctx.globalAlpha=1;
    fillRR(px,py,it.w,it.h,9,col);
    strokeRR(px,py,it.w,it.h,9,'rgba(255,255,255,0.55)',2);
    ctx.fillStyle='#111'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText(labels[it.type]||'?', cx, cy+4);
  }
}
function drawStar(cx,cy,outer,inner,pts) {
  ctx.beginPath();
  for (let i=0;i<pts*2;i++) {
    const r = i%2===0?outer:inner;
    const a = (i/pts)*Math.PI - Math.PI/2;
    if (i===0) ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

// ── Goal Flag ──────────────────────────────────────────────────────────────
function drawGoal(gx, gy, t) {

// ── Background ─────────────────────────────────────────────────────────────
function drawBg(bg, levelW) {

  grad.addColorStop(0, bg[1]); grad.addColorStop(1, bg[0]);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  // parallax clouds/details at 0.3x speed
  ctx.fillStyle='rgba(255,255,255,0.15)';
  const off = cam.x*0.3;
  for (let i=0;i<20;i++) {
    const cx2=((i*400+200)-off%levelW+levelW)%levelW - cam.x;
    if (cx2>-200&&cx2<W+200) {
      ctx.fillRect(cx2,60+((i*73)%120),80+((i*37)%60),20);
      ctx.fillRect(cx2+20,45+((i*73)%120),50,20);
    }
  }
}
function drawPlatforms(plats, world) {
  const cols = [['#3d7a2a','#2d5a1b'],['#4a3520','#2d1f0f'],['#b0c8e0','#8aaac0'],['#8a3320','#5a1e10'],['#dfeaf6','#a9c4e0'],['#d4b860','#9a7830']];
  const [top,side] = cols[world]||cols[0];
  for (const [px,py,pw,ph] of plats) {
    ctx.fillStyle=side; ctx.fillRect(px-cam.x,py-cam.y,pw,ph);
    ctx.fillStyle=top;  ctx.fillRect(px-cam.x,py-cam.y,pw,Math.min(8,ph));
  }
}

// ── Gameplay Scene State ───────────────────────────────────────────────────
let player, enemies, items, hazards, checkpoints, goalPos, levelData, gameTimer;
let levelCoins = 0, levelStars = 0, runNoHit = true;
let lcStats = null, lcT = 0; // level-complete screen data

function startLevel() {
  levelData = mkLevel(gs.world, gs.level);
  player = mkPlayer();
  if(mp.active && mp.connected){
    player.x = mp.role==='host' ? 80 : 150;
    player.respawnX = player.x;
  }
  player.lives = gs.lives;
  enemies = mkEnemies(levelData.enemies.concat(extraEnemies(gs.world, gs.level)));
  items = mkCollectibles(levelData.coins, levelData.stars, levelData.powerups);
  hazards = mkHazards(hazardData(gs.world, gs.level));
  checkpoints = computeCheckpoints(levelData);
  projectiles = [];
  goalPos = levelData.goal;
  gameTimer = 0;
  levelCoins = 0; levelStars = 0; runNoHit = true;
  particles = [];
  fx = []; shake = 0; flash = null; banner = null;
  camUpdate(player.x, player.y, levelData.levelW, true);
}

function updateGameplay(dt) {
  gameTimer += dt;
  const ld = levelData;

  updatePlayer(player, dt, ld.platforms, ld.levelW);
  for (const e of enemies) updateEnemy(e, dt, ld.platforms, player.x, player.y, ld.levelW);
  updateHazards(dt);
  updateProjectiles(dt, ld.levelW);
  updateCheckpoints();
  updateParticles(dt);
  updateFx(dt);

  // Coin magnet (bought in the shop): pull nearby uncollected coins to the bear.
  if (gs.magnet) {
    const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
    for (const it of items) {
      if (it.taken || it.type!=='coin') continue;
      const dx=pcx-(it.x+it.w/2), dy=pcy-(it.y+it.h/2), d=Math.hypot(dx,dy);
      if (d<220 && d>1) { const s=Math.min(1,520/d)*420*dt; it.x+=dx/d*s; it.y+=dy/d*s; }
    }
  }

  // Collectibles
  for (const it of items) {
    if (it.taken) continue;
    if (!rectOverlap(player.x,player.y,player.w,player.h, it.x,it.y,it.w,it.h)) continue;
    it.taken = true;
    const cx=it.x+it.w/2, cy=it.y+it.h/2;
    if (it.type==='coin')  { gs.score+=COIN_PTS; gs.coins++; gs.wallet++; levelCoins++; sfx.coin(); spawnParticles(cx,cy,'#FFD700',6); spawnText(cx,cy-8,'+'+COIN_PTS,'#FFD700',14); unlockAch('firstcoin'); checkCollectAch(); }
    else if (it.type==='star') { gs.score+=STAR_PTS; levelStars++; sfx.star(); spawnParticles(cx,cy,'#FFE066',14,220); spawnRing(cx,cy,'#FFE066',40,0.35); spawnText(cx,cy-8,'+'+STAR_PTS,'#FFE066',18); }
    else if (it.type==='life') { if (gs.lives<maxLives()){ gs.lives++; player.lives=gs.lives; } sfx.power(); spawnParticles(cx,cy,'#ff5d77',14,220); spawnRing(cx,cy,'#ff5d77',44,0.4); spawnText(cx,cy-8,'+1 VIDA','#ff8da1',16); }
    else { player.power=it.type; player.powerTimer=10; if(it.type==='djump')player.djumpUsed=false; sfx.power(); spawnParticles(cx,cy,'#0ff',14,220); spawnRing(cx,cy,'#0ff',44,0.4); spawnText(cx,cy-8,it.type.toUpperCase()+'!','#0ff',16); }
  }

  // Special offensive frames (punch / dash): defeat enemies on contact, take no damage
  if ((player.attackTimer>0 || player.dashTimer>0) && player.respawnTimer<=0) {
    const reach = player.attackTimer>0 ? 44 : 8;
    const hx = player.facing>0 ? player.x - 4 : player.x - reach;
    const hw = player.w + reach + 4;
    for (const e of enemies) {
      if (!e.active) continue;
      if (!rectOverlap(hx,player.y,hw,player.h, e.x,e.y,e.w,e.h)) continue;
      const ecx=e.x+e.w/2, ecy=e.y+e.h/2;
      if (e.type==='boss') {
        e.hp--; e.hitFlash=0.25; e.range=Math.floor(e.range*1.15);
        spawnSparks(ecx,ecy,'#fff',14,360); spawnRing(ecx,ecy,'#ffcf3a',60,0.35); addShake(0.16); addFlash('#fff',0.08);
        if (e.hp<=0) { e.active=false; gs.score+=BOSS_PTS; spawnParticles(ecx,ecy,'#FFD700',26,300); spawnRing(ecx,ecy,'#FFD700',110,0.5); spawnText(ecx,ecy-10,'+'+BOSS_PTS,'#FFD700',22); addShake(0.3); addFlash('#fff',0.15); dropReward(ecx,ecy,true); }
        else { gs.score+=100; spawnText(ecx,ecy-10,'HIT! '+e.hp,'#fff',16); }
        player.attackTimer = 0; // one hit per punch
      } else if (e.type==='miniboss') {
        e.hp--; e.hitFlash=0.2; spawnSparks(ecx,ecy,'#fff',12,320); spawnRing(ecx,ecy,'#b06bff',60,0.35); addShake(0.14);
        if (e.hp<=0) { e.active=false; gs.score+=MINIBOSS_PTS; spawnParticles(ecx,ecy,'#b06bff',22,260); spawnRing(ecx,ecy,'#b06bff',95,0.45); spawnText(ecx,ecy-10,'+'+MINIBOSS_PTS,'#c9f',20); addShake(0.22); addFlash('#fff',0.12); dropReward(ecx,ecy); }
        else { gs.score+=80; spawnText(ecx,ecy-10,'HIT! '+e.hp,'#fff',16); }
        player.attackTimer = 0; // one hit per punch
      } else {
        e.active=false; gs.score+=ENEMY_PTS;
        spawnParticles(ecx,ecy,'#fff',14); spawnSparks(ecx,ecy,'#ffd24d',8,300); spawnText(ecx,ecy-8,'+'+ENEMY_PTS,'#fff',14);
      }
    }
  }

  // Enemy collisions
  if (player.invTimer<=0 && player.respawnTimer<=0 && (player.power!=='inv')) {
    for (const e of enemies) {
      if (!e.active) continue;
      if (!rectOverlap(player.x,player.y,player.w,player.h, e.x,e.y,e.w,e.h)) continue;
      // Stomp?
      const stomp = player.vy>=6 && (player.y+player.h) <= e.y+(e.h/2+12);
      const ecx=e.x+e.w/2, ecy=e.y+e.h/2;
      if (stomp) {
        player.vy = STOMP_BOUNCE; sfx.stomp();
        if (e.type==='armor') {
          // Armored: stomping just clangs off — must be hit with a special.
          e.hitFlash=0.12; spawnSparks(ecx,ecy,'#dde',10,220); spawnText(ecx,ecy-8,'CLANC!','#cdd',14);
        } else if (e.type==='miniboss') {
          e.hp--; e.hitFlash=0.2; spawnParticles(ecx,ecy,'#c9f',12); spawnRing(ecx,ecy,'#b06bff',60,0.35); addShake(0.14);
          if (e.hp<=0) { e.active=false; gs.score+=MINIBOSS_PTS; spawnParticles(ecx,ecy,'#b06bff',22,260); spawnRing(ecx,ecy,'#b06bff',95,0.45); spawnText(ecx,ecy-10,'+'+MINIBOSS_PTS,'#c9f',20); addShake(0.22); addFlash('#fff',0.12); dropReward(ecx,ecy); }
          else { gs.score+=80; spawnText(ecx,ecy-10,'HIT! '+e.hp,'#fff',16); }
        } else if (e.type==='boss') {
          spawnParticles(ecx,ecy,'#fff',10); spawnDust(ecx,ecy+e.h/2,6,'#ddd');
          e.hp--;
          e.hitFlash=0.25;
          e.range = Math.floor(e.range*1.15);
          spawnRing(ecx,ecy,'#ffcf3a',60,0.35); addShake(0.16);
          if (e.hp<=0) { e.active=false; gs.score+=BOSS_PTS; spawnParticles(ecx,ecy,'#FFD700',24,260); spawnRing(ecx,ecy,'#FFD700',110,0.5); spawnText(ecx,ecy-10,'+'+BOSS_PTS,'#FFD700',22); addShake(0.3); addFlash('#fff',0.15); dropReward(ecx,ecy,true); }
          else { gs.score+=100; spawnText(ecx,ecy-10,'HIT! '+e.hp,'#fff',16); }
        } else {
          spawnParticles(ecx,ecy,'#fff',10); spawnDust(ecx,ecy+e.h/2,6,'#ddd');
          e.active=false; gs.score+=ENEMY_PTS; spawnText(ecx,ecy-8,'+'+ENEMY_PTS,'#fff',14);
        }
      } else {
        sfx.hurt(); gs.lives--; player.lives=gs.lives; runNoHit=false;
        addFlash('#ff2b2b',0.22); addShake(0.2);
        spawnText(player.x+player.w/2, player.y-6, '-1', '#ff4d4d', 20);
        if (gs.lives<=0) { gameOver(); return; }
        respawnPlayer();
      }
    }
  }

  // Hazard collisions (spikes / saws). Special i-frames, the Inv power and the
  // Rewind shield all protect you, so dashing through is briefly safe.
  if (player.invTimer<=0 && player.respawnTimer<=0 && player.power!=='inv') {
    for (const h of hazards) {
      let hx=h.x, hy=h.y, hw=h.w, hh=h.h;
      if (h.type==='spikes') { hy+=6; hh-=6; }   // a bit forgiving at the base
      else { hx+=6; hy+=6; hw-=12; hh-=12; }      // saw hitbox tighter than visual
      if (!rectOverlap(player.x+4,player.y+4,player.w-8,player.h-4, hx,hy,hw,hh)) continue;
      sfx.hurt(); gs.lives--; player.lives=gs.lives; runNoHit=false;
      addFlash('#ff2b2b',0.22); addShake(0.2);
      spawnText(player.x+player.w/2, player.y-6, '-1', '#ff4d4d', 20);
      if (gs.lives<=0) { gameOver(); return; }
      respawnPlayer();
      break;
    }
  }

  // Projectile collisions. Absorbed harmlessly while protected; otherwise hurt.
  for (let i=projectiles.length-1; i>=0; i--) {
    const pr = projectiles[i];
    if (!rectOverlap(player.x,player.y,player.w,player.h, pr.x,pr.y,pr.w,pr.h)) continue;
    const cxp=pr.x+pr.w/2, cyp=pr.y+pr.h/2;
    projectiles.splice(i,1);
    const protectedNow = player.invTimer>0 || player.respawnTimer>0 || player.power==='inv';
    if (protectedNow) { spawnSparks(cxp,cyp,'#b06bff',8,220); continue; }
    sfx.hurt(); gs.lives--; player.lives=gs.lives; runNoHit=false;
    addFlash('#ff2b2b',0.22); addShake(0.18);
    spawnParticles(cxp,cyp,'#b06bff',10,200);
    spawnText(player.x+player.w/2, player.y-6, '-1', '#ff4d4d', 20);
    if (gs.lives<=0) { gameOver(); return; }
    respawnPlayer();
    break;
  }

  // Pit death
  if (player.y > 800) {
    sfx.hurt(); gs.lives--; player.lives=gs.lives; runNoHit=false;
    addFlash('#ff2b2b',0.22); addShake(0.2);
    if (gs.lives<=0) { gameOver(); return; }
    respawnPlayer();
  }

  // Goal
  if (rectOverlap(player.x,player.y,player.w,player.h, goalPos[0],goalPos[1],40,80)) {
    sfx.win();
    spawnRing(goalPos[0]+20,goalPos[1]+40,'#39d353',120,0.6);
    spawnSparks(goalPos[0]+20,goalPos[1]+20,'#39d353',24,360);
    spawnText(goalPos[0]+20,goalPos[1],'LEVEL CLEAR!','#39d353',20);
    addFlash('#fff',0.18);
    const mult = diff().score;
    const timeBonus = Math.round(Math.max(0, 2000 - gameTimer*20) * mult);
    const base = Math.round(LEVEL_PTS * mult);
    gs.score += base + timeBonus;
    if (gs.score > gs.highScore) gs.highScore = gs.score;
    gs.levelDone[gs.world][gs.level] = true;
    if (gs.level===2 && gs.world<LAST_WORLD) gs.worldUnlocked[gs.world+1]=true;
    if (runNoHit) unlockAch('nohit');
    if (gameTimer < 20) unlockAch('speed');
    checkCollectAch();
    saveGame();
    lcStats = { world:gs.world, level:gs.level, time:gameTimer, bonus:timeBonus, base:base, coins:levelCoins, stars:levelStars };
    changeScene('levelcomplete'); lcT=0;
    return;
  }

  camUpdate(player.x, player.y, ld.levelW);
  if (gs.score > gs.highScore) gs.highScore = gs.score;
  mpTick(dt);

  // Pause
  if (pressed('Escape')||pressed('KeyP')) { gs.scene='pause'; pauseSel=0; }
}

function gameOver(){
  if (gs.score>gs.highScore) gs.highScore=gs.score;
  saveGame();
  changeScene('gameover'); goSel=0; goT=0;
}

function respawnPlayer() {
  player.x=player.respawnX||80; player.y=player.respawnY||570; player.vx=0; player.vy=0;
  player.invTimer=2; player.respawnTimer=1.5;
  camUpdate(player.x, player.y, levelData.levelW, true);
}

function advanceLevel() {
  if (gs.level < 2) {
    gs.level++;
    startLevel();
    changeScene('gameplay');
  } else if (gs.world < LAST_WORLD) {
    gs.world++; gs.level=0;
    changeScene('worldmap'); wmSel=gs.world; wmLvl=0;
  } else {
    changeScene('victory'); vicT=0;   // cleared all worlds
  }
}

function drawGameplay(t) {
  const ld = levelData;
  // Screen shake: jitter the camera during world rendering, then restore.
  const sx=cam.x, sy=cam.y;
  if (shake>0) { const m=Math.min(8, shake*55); cam.x+=(Math.random()*2-1)*m; cam.y+=(Math.random()*2-1)*m; }
  drawBg(ld.bg, ld.levelW);
  drawPlatforms(ld.platforms, gs.world);
  drawCheckpoints();
  drawHazards();
  drawProjectiles();
  for (const it of items) drawCollectible(it, t);
  drawGoal(...goalPos, t);
  for (const e of enemies) drawEnemy(e);
  drawFx();
  drawParticles();
  drawPlayer(player);
  drawRemotePlayer();
  cam.x=sx; cam.y=sy;
  drawFlash();
  drawBanner();
  drawHUD(t);
}

function drawHUD(t) {
  // Top bar with rounded bottom edge
  fillRR(8,8,W-16,52,14,'rgba(8,12,20,0.82)');

  // Lives as heart icons
  for(let i=0;i<Math.min(player.lives,8);i++) drawHeartIcon(28+i*22, 18, 10);
  if(player.lives>8) hud('+'+(player.lives-8), 28+8*22, 36, UI.red, 14);
  // Score center
  hud('SCORE '+gs.score, W/2, 38, UI.bright, 20, 'center');
  // Coins right
  drawCoinIcon(W-52, 28, 11); hud(''+gs.coins, W-28, 38, UI.gold, 20, 'right');
  // Bottom info bar
  fillRR(8,H-52,W-16,40,12,'rgba(8,12,20,0.72)');
  strokeRR(8,H-52,W-16,40,12,'rgba(255,255,255,0.1)',1);
  uiPill(18,H-28, 'W'+(gs.world+1)+'-'+(gs.level+1), UI.cyan);
  hud('TIME '+gameTimer.toFixed(1)+'s', W/2, H-26, UI.cyan, 16, 'center');
  const ch = CHARACTERS[gs.character]||CHARACTERS[0];
  uiPill(W-130,H-28, ch.name, UI.gold);
  if(mp.active && mp.connected){
    fillRR(W/2-70, 62, 140, 22, 8, 'rgba(0,180,255,0.35)');
    hud('ONLINE · '+mp.remoteName, W/2, 74, '#7df', 13, 'center');
  }
  // Power-up bar
  if (player.power) {
    const pw=150, px2=W-pw-20, py2=H-78;
    hud(player.power.toUpperCase(), W-20, py2-4, UI.bright, 13, 'right');
    const pc = player.power==='djump'?UI.cyan:player.power==='speed'?UI.green:UI.gold;
    uiBar(px2,py2,pw,10,player.powerTimer/10,pc);
  }
  // Special cooldown
  if (ch.special) {
    const ready=player.sp<=0, bw=130;
    hud('SP '+ch.special.name, 18, H-78, ready?UI.green:UI.dim, 13);
    uiBar(18,H-64,bw,9, ready?1:1-(player.sp/ch.special.cd), ready?UI.green:'#fa0');
  }
  if (player.respawnTimer>0) {
    fillRR(0,0,W,H,0,'rgba(0,0,0,0.55)'); uiTitle('RESPAWNING...',H/2,36,UI.bright);
  }
}

function drawMenu(t) {

// ── World Map ──────────────────────────────────────────────────────────────
let wmSel=0, wmLvl=0;
const worldNames=['FOREST','CAVE','SNOW','LAVA','SKY','VALLE'];
const worldColors=[['#2d6e1a','#1a4010'],['#2a3f5a','#0d1b2a'],['#6090b0','#3060a0'],['#7a2418','#3a0d08'],['#5a86c0','#2b4f7a'],['#a08030','#6a5018']];

function updateWorldMap(dt) {
  if (mp.active && mp.role==='guest') {
    if (pressed('Escape')) { changeScene('menu'); return; }
    return;
  }
  const prevSel=wmSel, prevLvl=wmLvl;
  if (pressed('ArrowLeft'))  wmSel=Math.max(0,wmSel-1);
  if (pressed('ArrowRight')) wmSel=Math.min(LAST_WORLD,wmSel+1);
  if (pressed('ArrowUp'))    wmLvl=Math.max(0,wmLvl-1);
  if (pressed('ArrowDown'))  wmLvl=Math.min(2,wmLvl+1);
  if (wmSel!==prevSel || wmLvl!==prevLvl) mpHostBroadcast();
  if (pressed('Enter')||pressed('Space')) {
    if (gs.worldUnlocked[wmSel]) {
      sfx.select();
      gs.world=wmSel; gs.level=wmLvl;
      startLevel(); changeScene('gameplay');
      mpHostBroadcast();
    }
  }
  if (pressed('Escape')) { if(mp.active) mpDisconnect(); changeScene('menu'); }
}

function drawWorldMap(t) {
  uiBgGrad('#080c14','#141e2e'); uiSparkles(t*0.5, 24);
  uiTitle('MAPA DE MUNDOS', 58, 38);

  const cardW=WORLD_COUNT>5?195:210, gap=WORLD_COUNT>5?12:18, totalW=WORLD_COUNT*cardW+(WORLD_COUNT-1)*gap, startX=(W-totalW)/2;
  for (let wi=0;wi<WORLD_COUNT;wi++) {
    const cx=startX+wi*(cardW+gap)+cardW/2, cy=H/2-10;
    const locked=!gs.worldUnlocked[wi], sel=wi===wmSel;
    const [c1,c2]=worldColors[wi];
    const bx=cx-cardW/2, by=cy-150;
    if(sel){ ctx.shadowColor='rgba(255,215,0,0.35)'; ctx.shadowBlur=16; }
    fillRR(bx,by,cardW,290,16, locked?'#222830':c2);
    if(!locked){ const cg=ctx.createLinearGradient(bx,by,bx,by+290); cg.addColorStop(0,c1); cg.addColorStop(1,c2);
      fillRR(bx,by,cardW,290,16,cg); }
    ctx.shadowBlur=0;
    strokeRR(bx,by,cardW,290,16, sel?UI.gold:'rgba(255,255,255,0.15)', sel?3:1);

    ctx.fillStyle=locked?'#666':UI.bright;
    ctx.font='bold 20px monospace'; ctx.textAlign='center';
    ctx.fillText(worldNames[wi],cx,cy-112);

    if (locked) {
      ctx.fillStyle=UI.dim; ctx.font='16px monospace';
      ctx.fillText('BLOQUEADO',cx,cy); ctx.fillText('Completa el',cx,cy+26); ctx.fillText('mundo anterior',cx,cy+48);
    } else {
      for (let lv=0;lv<3;lv++) {
        const lx=cx+(lv-1)*60, ly=cy+30, lvsel=sel&&lv===wmLvl, done=gs.levelDone[wi][lv], r=lvsel?16:11;
        fillRR(lx-r,ly-r,r*2,r*2,r, done?UI.gold:lvsel?UI.green:'rgba(255,255,255,0.85)');
        if(lvsel) strokeRR(lx-r,ly-r,r*2,r*2,r,UI.gold,2);
        ctx.fillStyle=done?'#111':'#222'; ctx.font=`bold ${lvsel?15:12}px monospace`;
        ctx.fillText(lv+1,lx,ly+5);
        if (done) { ctx.fillStyle=UI.gold; ctx.font='14px monospace'; ctx.fillText('*',lx,ly+30); }
      }
      if(sel){ ctx.fillStyle=UI.dim; ctx.font='14px monospace'; ctx.fillText('W'+(wi+1)+'-'+(wmLvl+1),cx,cy+88); }
    }
  }

  fillRR(0,H-68,W,68,0,'rgba(0,0,0,0.65)');
  hud('Vidas:'+gs.lives+'  Monedas:'+gs.coins+'  Score:'+gs.score, W/2, H-24, UI.bright, 18, 'center');
  uiFooter('Enter=Jugar  Flechas=Navegar  Esc=Menu');
  if(wmSel===LAST_WORLD && gs.worldUnlocked[wmSel]){
    hud('VALLE: mundo grande, pocos enemigos', W/2, H-50, '#c4a050', 14, 'center');
  }
  if (mp.active && mp.role==='guest') {
    fillRR(W/2-220, H-120, 440, 52, 14, 'rgba(0,120,200,0.45)');
    hud('Esperando al anfitrion...', W/2, H-92, '#7df', 18, 'center');
  } else if (mp.active && mp.role==='host' && mp.connected) {
    uiPill(W/2-100, H-100, 'Amigo conectado', UI.green);
  }
}

let shopSel=0;
function buildShop(){
  const list=[];
  if(!gs.magnet) list.push({key:'magnet', label:'Iman de monedas', desc:'Atrae monedas cercanas', cost:300});
  if(gs.bonusLives<3) list.push({key:'life', label:'Vida extra inicial', desc:`Empiezas con +1 vida  (${gs.bonusLives}/3)`, cost:200*(gs.bonusLives+1)});
  for(let i=0;i<CHARACTERS.length;i++){
    const c=CHARACTERS[i];
    if((c.unlock||0)>0 && !(gs.bought&&gs.bought[i]) && worldsCleared()<c.unlock){
      list.push({key:'char', idx:i, label:'Personaje: '+c.name, desc:c.desc, cost:150*c.unlock});
    }
  }
  return list;
}
function buyShop(item){
  if(!item) return;
  if(gs.wallet<item.cost){ sfx.hurt(); showBanner('SIN MONEDAS','#f66'); return; }
  gs.wallet-=item.cost;
  if(item.key==='magnet') gs.magnet=true;
  else if(item.key==='life') gs.bonusLives=Math.min(3,gs.bonusLives+1);
  else if(item.key==='char') gs.bought[item.idx]=true;
  unlockAch('shopper'); checkCollectAch();
  sfx.power(); saveGame();
  showBanner('COMPRADO!','#3f6');
}
function updateShop(dt){
  const list=buildShop(), n=Math.max(1,list.length);
  if(shopSel>=n) shopSel=n-1; if(shopSel<0) shopSel=0;
  if(pressed('ArrowUp')||pressed('KeyW')){ shopSel=(shopSel-1+n)%n; sfx.select(); }
  if(pressed('ArrowDown')||pressed('KeyS')){ shopSel=(shopSel+1)%n; sfx.select(); }
  if(pressed('Escape')){ changeScene('menu'); return; }
  if((pressed('Enter')||pressed('Space')) && list.length){ buyShop(list[shopSel]); }
  if(banner){ banner.life-=dt; if(banner.life<=0) banner=null; }
}
function drawShop(){
  uiBgGrad('#100818','#161020', false);
  uiTitle('TIENDA', 72, 42);
  drawCoinIcon(W/2-60, 108, 12); hud(' '+gs.wallet+' monedas', W/2+10, 114, UI.gold, 22, 'center');
  uiPanel(W/2-380,130,760,480,18);
  const list=buildShop();
  if(!list.length){
    hud('Todo comprado. Buen trabajo!', W/2, H/2, UI.green, 24, 'center');
  } else {
    list.forEach((o,i)=>{
      const y=175+i*58, afford=gs.wallet>=o.cost;
      uiListRow(y, o.label, o.cost+' mon.', i===shopSel, afford?UI.gold:UI.red);
      hud(o.desc, W/2-330, y+18, UI.dim, 14);

    const y=158+i*58, on=!!gs.ach[a.id];
    fillRR(W/2-350,y-28,700,48,10, on?'rgba(60,200,90,0.12)':'rgba(255,255,255,0.04)');
    if(on) strokeRR(W/2-350,y-28,700,48,10,'rgba(60,200,90,0.35)',1);
    ctx.textAlign='left'; ctx.font='bold 22px monospace';
    ctx.fillStyle=on?UI.green:'#555'; ctx.fillText('*', W/2-338, y);
    ctx.fillStyle=on?UI.bright:'#777'; ctx.fillText(a.name, W/2-310, y-2);
    ctx.font='14px monospace'; ctx.fillStyle=on?UI.dim:'#555'; ctx.fillText(a.desc, W/2-310, y+16);
  });
  uiFooter('Enter / Esc para volver');
}

// ── Main Loop ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
ctx = canvas.getContext('2d');

// Scale canvas to window
function resize() {
  const scale = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width  = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}
window.addEventListener('resize', resize); resize();

// ── Touch controls ──────────────────────────────────────────────────────────
// Reuse the same key maps the keyboard handlers feed, so the game logic
// (pressed/held) works identically whether input comes from keys or touch.
function touchPress(code)   { if (!keys[code]) keyDown[code] = true; keys[code] = true; }
function touchRelease(code) { keys[code] = false; keyUp[code] = true; }

function setupTouch() {
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.body.classList.add('touch');

  document.querySelectorAll('#touch .tbtn').forEach(btn => {
    const code = btn.dataset.code;
    const down = e => {
      e.preventDefault();
      btn.classList.add('active');
      audioInit();
      touchPress(code);
      tryImmersive();
    };
    const up = e => {
      e.preventDefault();
      btn.classList.remove('active');
      touchRelease(code);
    };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointercancel', up);
    btn.addEventListener('pointerleave', up);
    btn.addEventListener('contextmenu', e => e.preventDefault());
  });
}

// Go fullscreen + try to lock landscape on the first interaction (best effort).
let immersiveDone = false;
function tryImmersive() {
  if (immersiveDone) return;
  immersiveDone = true;
  const el = document.documentElement;
  (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el).catch?.(() => {});
  screen.orientation?.lock?.('landscape').catch?.(() => {});
}
setupTouch();

// ── Service worker (offline / installable PWA) ──────────────────────────────
if ('serviceWorker' in navigator) {
  // Reload once the new service worker takes control so the phone always runs
  // the freshly cached build instead of a stale one.
  let reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloaded) return;
    reloaded = true;
    location.reload();
  });
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
      // Periodically check for a newer build while the game is open.
      setInterval(() => reg.update(), 60 * 1000);
    }).catch(() => {}));
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  const t = ts/1000;

  updateSceneTrans(dt);
  ctx.clearRect(0,0,W,H);

  const scene = renderScene();
  const updating = sceneUpdating();

  if (updating) {
    switch(gs.scene) {
      case 'menu':       updateMenu(dt); break;
      case 'worldmap':   updateWorldMap(dt); break;
      case 'gameplay':   updateGameplay(dt); break;
      case 'pause':      updatePause(dt); break;
      case 'gameover':   updateGameOver(dt); break;
      case 'levelcomplete': updateLevelComplete(dt); break;
      case 'victory':    updateVictory(dt); break;
      case 'settings':   updateSettings(dt); break;
      case 'credits':    updateCredits(dt); break;
      case 'charselect': updateCharSelect(dt); break;
      case 'shop':       updateShop(dt); break;
      case 'achievements': updateAchievements(dt); break;
      case 'multimenu':  updateMultiMenu(dt); break;
      case 'mpcreate':   updateMpCreate(dt); break;
      case 'mpjoin':     updateMpJoin(dt); break;
    }
  }

  switch(scene) {
    case 'menu':          drawMenu(t); break;
    case 'instructions':  drawInstructions(); break;
    case 'worldmap':      drawWorldMap(t); break;
    case 'gameplay':      drawGameplay(t); break;
    case 'pause':         drawPause(); break;
    case 'gameover':      drawGameOver(); break;
    case 'levelcomplete': drawLevelComplete(); break;
    case 'victory':       drawVictory(); break;
    case 'settings':      drawSettings(); break;
    case 'credits':       drawCredits(); break;
    case 'charselect':    drawCharSelect(); break;
    case 'shop':          drawShop(); break;
    case 'achievements':  drawAchievements(); break;
    case 'multimenu':     drawMultiMenu(t); break;
    case 'mpcreate':      drawMpCreate(t); break;
    case 'mpjoin':        drawMpJoin(t); break;
  }

  drawSceneTrans();
  clearFrame();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
(function(){
  const code=new URLSearchParams(location.search).get('sala');
  if(code){
    mp.joinBuf=code.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
    if(mp.joinBuf.length===6){ mp.autoJoin=true; gs.scene='mpjoin'; }
  }
})();
</script>
