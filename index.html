<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a5c1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Super Bear">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Super Bear Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 30%, #1a3a1a 0%, #050a08 70%);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; overflow: hidden;
  touch-action: none; user-select: none; -webkit-user-select: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
canvas {
  display: block; image-rendering: pixelated;
  border-radius: 8px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,215,0,0.08);
}

/* ── On-screen touch controls (shown only on touch devices) ── */
#touch { display: none; pointer-events: none; }
body.touch #touch { display: block; pointer-events: auto; }

#touch .pad, #touch .btns { position: fixed; bottom: 28px; z-index: 10; }
#touch .pad  { left: 20px; }
#touch .btns { right: 20px; display: flex; align-items: flex-end; gap: 16px; }

.tbtn {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 26px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(145deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06));
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  touch-action: none;
  transition: transform 0.08s, background 0.08s, box-shadow 0.08s;
}
.tbtn.active {
  transform: scale(0.94);
  background: linear-gradient(145deg, rgba(255,215,0,0.55), rgba(255,180,0,0.25));
  border-color: #ffd700;
  box-shadow: 0 2px 12px rgba(255,215,0,0.35), inset 0 2px 8px rgba(0,0,0,0.15);
}

/* D-pad layout (cross) */
.pad { display: grid; grid-template-columns: repeat(3, 68px); grid-template-rows: repeat(3, 68px); gap: 5px; }
#bUp    { grid-column: 2; grid-row: 1; }
#bLeft  { grid-column: 1; grid-row: 2; }
#bDown  { grid-column: 2; grid-row: 3; }
#bRight { grid-column: 3; grid-row: 2; }

/* Action buttons */
#bJump  {
  width: 100px; height: 100px; border-radius: 50%; font-size: 15px; letter-spacing: 0.5px;
  background: linear-gradient(145deg, rgba(80,220,100,0.45), rgba(40,140,60,0.35));
  border-color: rgba(120,255,140,0.75);
  box-shadow: 0 4px 20px rgba(60,200,80,0.25), inset 0 1px 0 rgba(255,255,255,0.25);
}
#bSp    {
  width: 78px; height: 78px; border-radius: 50%; font-size: 18px;
  background: linear-gradient(145deg, rgba(255,210,77,0.45), rgba(200,150,30,0.35));
  border-color: rgba(255,210,77,0.85);
  box-shadow: 0 4px 18px rgba(255,200,50,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
}
#bPause {
  position: fixed; top: 18px; right: 18px; width: 52px; height: 52px;
  font-size: 18px; border-radius: 14px;
  background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
}

@media (orientation: portrait) {
  #touch .pad, #touch .btns { bottom: 64px; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Touch controls overlay -->
<div id="touch">
  <div class="pad">
    <div class="tbtn" id="bUp"    data-code="ArrowUp">▲</div>
    <div class="tbtn" id="bLeft"  data-code="ArrowLeft">◀</div>
    <div class="tbtn" id="bDown"  data-code="ArrowDown">▼</div>
    <div class="tbtn" id="bRight" data-code="ArrowRight">▶</div>
  </div>
  <div class="btns">
    <div class="tbtn" id="bSp"   data-code="KeyJ">SP</div>
    <div class="tbtn" id="bJump" data-code="Space">JUMP</div>
  </div>
  <div class="tbtn" id="bPause" data-code="Escape">II</div>
</div>

<script src="vendor/peer.min.js"></script>
<script src="js/game.js"></script>
</body>
</html>
